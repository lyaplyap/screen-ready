<!--
  Loaded into the Storybook preview iframe <head>.
  Inter isn't bundled with the project, so we pull it from Google Fonts
  here so stories render with the same family the real plugin uses
  (see src/ui/app/styles/main.css: font-family: Inter, Roboto, ...).
  To self-host instead, install @fontsource/inter and import it from preview.tsx.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
>
